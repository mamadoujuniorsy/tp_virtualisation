version: '3.8'

services:
  # Service de base de données MySQL
  db:
    image: mysql:8.0
    container_name: dic2iabd_mysql_mamadou
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      # Persistance des données MySQL
      - mysql_data_mamadou:/var/lib/mysql
      # Script d'initialisation
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3847:3306"
    networks:
      - dic2iabd_network_mamadou
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service de l'application (Frontend + Backend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dic2iabd_app_mamadou
    restart: always
    ports:
      - "8087:3000"
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dic2iabd_network_mamadou

# Réseau pour la communication entre conteneurs
networks:
  dic2iabd_network_mamadou:
    driver: bridge

# Volume pour la persistance des données MySQL
volumes:
  mysql_data_mamadou:
